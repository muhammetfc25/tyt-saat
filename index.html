<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TYT ULTRA PRO</title>

<link href="https://fonts.cdnfonts.com/css/ds-digital" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    color:white;
    font-family:Arial;
    min-height:100vh;
}

/* FULLSCREEN SCREEN */
.screen{
    position:fixed;
    inset:0;
    background:#000;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

/* CLOCK */
#time{
    font-family:'DS-Digital';
    font-size:clamp(4.5rem,16vw,9rem);
    color:#ff1a1a;
    text-shadow:0 0 30px red;
}

/* PROGRESS */
.progress-container{
    width:80%;
    max-width:500px;
    margin-top:25px;
}

.progress-bar{
    width:100%;
    height:14px;
    background:#111;
    border-radius:20px;
    overflow:hidden;
    border:1px solid rgba(255,0,0,0.3);
}

.progress{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#ff0000,#ff4d4d);
    transition:0.3s;
}

.progress-text{
    margin-top:8px;
    color:#aaa;
    font-size:13px;
    text-align:center;
}

/* CARD */
.card{
    margin-top:25px;
    background:rgba(255,0,0,0.06);
    border:1px solid rgba(255,0,0,0.25);
    border-radius:18px;
    padding:20px;
    width:90%;
    max-width:500px;
    text-align:center;
}

.title{
    color:#ff3b3b;
    margin-bottom:15px;
    font-weight:bold;
}

/* INPUTS */
.inputs{
    display:flex;
    gap:10px;
}

.input-box{
    flex:1;
    display:flex;
    flex-direction:column;
    gap:6px;
}

label{
    font-size:12px;
    color:#aaa;
    text-align:left;
}

/* INPUT */
input[type=number]{
    padding:14px;
    border-radius:12px;
    border:1px solid rgba(255,0,0,0.3);
    background:#0a0a0a;
    color:#ff1a1a;
    font-size:20px;
    text-align:center;
    outline:none;
}

input::-webkit-outer-spin-button,
input::-webkit-inner-spin-button{
    -webkit-appearance:none;
    margin:0;
}

input[type=number]{
    -moz-appearance:textfield;
}

/* BUTTONS */
.buttons{
    display:flex;
    gap:10px;
    margin-top:15px;
}

button{
    flex:1;
    padding:14px;
    border:none;
    border-radius:12px;
    font-weight:bold;
    cursor:pointer;
}

.start{background:#16a34a;color:white;}
.stop{background:#f59e0b;color:black;}
.reset{background:#dc2626;color:white;}

#status{
    margin-top:15px;
    color:#aaa;
}

</style>
</head>

<body>

<div class="screen">

    <div id="time">00:00</div>

    <div class="progress-container">
        <div class="progress-bar">
            <div class="progress" id="progress"></div>
        </div>
        <div class="progress-text" id="progressText">0%</div>
    </div>

    <div class="card">

        <div class="title">⏱ TYT ULTRA PRO</div>

        <div class="inputs">

            <div class="input-box">
                <label>Saat</label>
                <input id="hourInput" type="number" value="10" min="0" max="23">
            </div>

            <div class="input-box">
                <label>Dakika</label>
                <input id="minInput" type="number" value="15" min="0" max="59">
            </div>

        </div>

        <div class="buttons">
            <button class="start" id="startBtn">BAŞLAT</button>
            <button class="stop" id="stopBtn">DURAKLAT</button>
            <button class="reset" id="resetBtn">SIFIRLA</button>
        </div>

        <div id="status">Hazır</div>

    </div>

</div>

<script>

/* SABİT SINAV ARALIĞI */
const EXAM_START = 10 * 60 + 15; // 10:15
const EXAM_END   = 13 * 60;      // 13:00
const TOTAL = EXAM_END - EXAM_START;

let hour = 0;
let minute = 0;
let timer = null;
let running = false;

/* UPDATE CLOCK */
function update(){

    document.getElementById("time").textContent =
        String(hour).padStart(2,'0') + ":" +
        String(minute).padStart(2,'0');

    updateProgress();
}

/* PROGRESS FIXED */
function updateProgress(){

    let current = hour * 60 + minute;

    let elapsed = current - EXAM_START;

    if(elapsed < 0) elapsed = 0;
    if(elapsed > TOTAL) elapsed = TOTAL;

    let percent = (elapsed / TOTAL) * 100;

    document.getElementById("progress").style.width = percent + "%";
    document.getElementById("progressText").textContent =
        Math.floor(percent) + "%";
}

/* START */
function start(){

    hour = parseInt(hourInput.value || 0);
    minute = parseInt(minInput.value || 0);

    running = true;

    document.getElementById("status").textContent = "🟢 Çalışıyor";

    if(timer) clearInterval(timer);

    timer = setInterval(() => {

        if(!running) return;

        minute++;

        if(minute >= 60){
            minute = 0;
            hour++;
        }

        update();

    }, 60000);

    update();
}

/* STOP */
function stop(){
    running = false;
    clearInterval(timer);
    timer = null;

    document.getElementById("status").textContent = "🟡 Duraklatıldı";
}

/* RESET */
function reset(){
    clearInterval(timer);
    timer = null;

    hour = 0;
    minute = 0;
    running = false;

    document.getElementById("progress").style.width = "0%";
    document.getElementById("progressText").textContent = "0%";

    document.getElementById("status").textContent = "Hazır";
}

document.getElementById("startBtn").addEventListener("click", start);
document.getElementById("stopBtn").addEventListener("click", stop);
document.getElementById("resetBtn").addEventListener("click", reset);

</script>

</body>
</html>
